name: Build & Release Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.1)'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java 17 (required by Gradle / Android SDK) ──────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Node.js ─────────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      # ── Install Expo CLI ─────────────────────────────────────────────────────
      - name: Install Expo CLI
        run: npm install -g @expo/cli@latest

      # ── Install mobile deps ──────────────────────────────────────────────────
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # ── Expo Prebuild (generates android/ folder) ────────────────────────────
      - name: Expo prebuild
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_NO_DOTENV: 1

      # ── Gradle permissions ───────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── Configure signing (optional — only if secrets are set) ───────────────
      - name: Configure keystore signing
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/scry.keystore
          cat >> android/app/build.gradle << 'EOF'

          android {
            signingConfigs {
              release {
                storeFile file("scry.keystore")
                storePassword System.getenv("KEYSTORE_PASS")
                keyAlias System.getenv("KEY_ALIAS")
                keyPassword System.getenv("KEY_PASS")
              }
            }
            buildTypes {
              release {
                signingConfig signingConfigs.release
              }
            }
          }
          EOF
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}

      # ── Build Release APK ────────────────────────────────────────────────────
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease --stacktrace --no-daemon \
            -Pandroid.injected.signing.store.file='' \
            -Dorg.gradle.jvmargs="-Xmx4g"
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS || '' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || '' }}
          KEY_PASS: ${{ secrets.KEY_PASS || '' }}

      # ── Rename APK ───────────────────────────────────────────────────────────
      - name: Locate and rename APK
        id: apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT
          cp "$APK_PATH" Scry.apk

      # ── Upload artifact ──────────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Scry-apk
          path: mobile/Scry.apk
          retention-days: 30

      # ── Create GitHub Release ────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.version }}
          name: Scry ${{ github.ref_name || inputs.version }}
          body: |
            ## Scry ${{ github.ref_name || inputs.version }}

            AI-powered document scanner for Android.

            ### Install
            1. Download `Scry.apk` below
            2. Enable **Install unknown apps** in Android Settings
            3. Open the APK and tap Install

            ### Requirements
            - Android 9.0+
            - Camera permission (for scanning)
            - Storage permission (for saving scans)

            ### What's new
            - See commits for full changelog
          files: mobile/Scry.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
